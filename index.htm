<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>progressive-webmcp demo</title>
</head>
<body>
  <main>
    <h1>progressive-webmcp demo</h1>

    <section aria-labelledby="search-heading">
      <h2 id="search-heading">Report search</h2>

      <form id="report-search" action="/search" method="get" data-webmcp-autosubmit="true">
        <p>
          <label for="q">Search term</label>
          <input id="q" name="q" type="search">
        </p>

        <p>
          <label for="year">Year</label>
          <input
            id="year"
            name="year"
            type="number"
            min="2000"
            max="2030"
            data-webmcp-param-description="Publication year as a four-digit number.">
        </p>

        <p>
          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="">All categories</option>
            <option value="nature">Nature</option>
            <option value="water">Water</option>
            <option value="climate">Climate</option>
          </select>
        </p>

        <button type="submit">Search</button>
      </form>
    </section>

    <section aria-labelledby="contact-heading">
      <h2 id="contact-heading">Contact</h2>

      <form id="contact" action="/contact" method="post" data-webmcp-name="contact_request" data-webmcp-description="Sends a contact request to the site owner.">
        <p>
          <label for="name">Name</label>
          <input id="name" name="name" autocomplete="name">
        </p>

        <p>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </p>

        <p>
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </p>

        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="progressive-webmcp.js" defer data-progressive-webmcp-auto></script>
</body>
</html>
